<!doctype html>
<html lang="tr" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Yazıhane Creative | 360° Hikaye Anlatıcısı</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Big+Shoulders+Display:wght@700;800;900&family=Inter:wght@300;400;500;600;700&family=Oswald:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400&family=Space+Grotesk:wght@600;700&family=Syne:wght@600;700;800&family=Rajdhani:wght@500;600;700&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #070707; --text-cream: #E1DBC8; --iris-red: #E61E25; --border-color: rgba(225, 219, 200, 0.15); --header-h: 90px; --sidebar-w: 60px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text-cream); font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        a { text-decoration: none; color: inherit; cursor: pointer; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.06; pointer-events: none; z-index: 9999; }

        .reveal-up { opacity: 0; transform: translateY(60px); transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal-up.is-visible { opacity: 1; transform: none; } 

        /* SOL BAR VE SIVI DOLMA EFEKTİ */
        #vertical-ticker { position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 30px 0; z-index: 1000; background: var(--bg); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; transition: 0.3s; }
        .status-dot.open { background: #00FF41; box-shadow: 0 0 10px rgba(0, 255, 65, 0.5); }
        .status-dot.closed { background: var(--iris-red); box-shadow: 0 0 10px rgba(230, 30, 37, 0.5); }
        .ticker-text-wrapper { writing-mode: vertical-rl; transform: rotate(180deg); height: 100%; display: flex; align-items: center; overflow: hidden; }
        .ticker-text { 
            font-family: 'Space Grotesk', sans-serif; font-size: clamp(10px, 2vh, 20px); letter-spacing: 0.35em; white-space: nowrap; font-weight: 700; 
            background: linear-gradient(to bottom, var(--iris-red) 50%, var(--text-cream) 50%);
            background-size: 100% 200%; background-position: 0% 100%; /* Sıvı Efekti Başlangıcı */
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; transition: background-position 0.1s ease-out;
        }

        /* HEADER & LOGO ANIMASYONLARI */
        header { position: fixed; top: 0; left: var(--sidebar-w); right: 0; height: var(--header-h); background: rgba(7, 7, 7, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-color); display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 4vw; z-index: 2000; transition: 0.3s; }
        .header-nav { display: flex; gap: clamp(8px, 1.5vw, 3vw); align-items: center; }
        .nav-right { justify-content: flex-end; }
        
        .header-logo img { height: clamp(35px, 4vw, 48px); transition: transform 0.4s ease; cursor: pointer; }
        @keyframes logoGlitch {
            0%, 92%, 100% { transform: scale(1); filter: none; }
            94% { transform: scale(1.1) translate(-3px, 2px); filter: drop-shadow(-3px 0 0 rgba(0,255,255,0.7)); }
            96% { transform: scale(1.1) translate(3px, -2px); filter: drop-shadow(3px 0 0 rgba(230,30,37,0.7)); }
        }
        header.scrolled .header-logo img { animation: logoGlitch 4s infinite linear; }
        .header-logo img:hover { transform: scale(1.3) rotate(-5deg) !important; animation: none !important; }

        .roll-link { position: relative; display: inline-block; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        .roll-link .glitch { position: absolute; top: 0; left: 0; right: 0; color: var(--iris-red); opacity: 0; transform: translateY(15px); transition: 0.3s; }
        .roll-link:hover .original { opacity: 0; } .roll-link:hover .glitch { opacity: 1; transform: translateY(0); }

        /* DIL MENÜSÜ */
        .desktop-lang-dropdown { position: relative; font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; margin-left: 15px; padding-left: 15px; border-left: 1px solid var(--border-color); }
        .desktop-lang-list { display: none; position: absolute; top: 100%; right: 0; background: #000; border: 1px solid var(--border-color); padding: 5px; }
        .desktop-lang-dropdown.active .desktop-lang-list { display: flex; flex-direction: column; }
        .lang-btn { padding: 5px 15px; opacity: 0.5; transition: 0.3s; } .lang-btn.active, .lang-btn:hover { opacity: 1; color: var(--text-cream); }

        /* ANA SAYFA ÖZEL */
        main { margin-left: var(--sidebar-w); }
        #hero { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .hero-title { font-family: 'Big Shoulders Display', sans-serif; font-size: clamp(3.5rem, 12vw, 18rem); font-weight: 900; line-height: 0.9; text-align: center; }
        .hero-title span { display: inline-block; transition: transform 0.1s ease-out; }

        #showreel-container { height: 120vh; position: relative; }
        .sticky-video { position: sticky; top: 0; height: 100vh; width: 100%; overflow: hidden; }
        .video-mask { width: 100%; height: 100%; clip-path: circle(5% at 50% 50%); transition: clip-path 0.1s ease-out; background: #000; }

        /* FOOTER & WAX SEAL */
        .site-footer { margin-left: var(--sidebar-w); border-top: 1px solid var(--border-color); padding: 8vw 4vw 4vw; position: relative; background: var(--bg); }
        .footer-giant a { display: inline-flex; align-items: center; justify-content: center; position: relative; font-family: 'Big Shoulders Display', sans-serif; font-size: clamp(4rem, 18vw, 22rem); font-weight: 900; line-height: 0.8; width: 100%; }
        .wax-seal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; background: #b0151a; border-radius: 50%; border: 2px solid #d42027; display: flex; justify-content: center; align-items: center; z-index: 10; transition: 0.5s; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .wax-seal img { width: 60%; filter: brightness(0); opacity: 0.7; }
        .footer-giant a:hover .wax-seal { transform: translate(-50%, -50%) scale(1.2) rotate(15deg); }

        @media (max-width: 768px) { #vertical-ticker { display: none; } main, .site-footer { margin-left: 0; } header { left: 0; } }
    </style>
</head>
<body>

    <app-sidebar></app-sidebar>
    <app-header></app-header>

    <main>
        <section id="hero">
            <h1 class="hero-title" id="parallax-title" data-i18n="hero_title">BİZ YAZIHANEYİZ</h1>
        </section>
        <section id="showreel-container">
            <div class="sticky-video">
                <div class="video-mask" id="video-mask">
                    <video autoplay loop muted playsinline style="width:100%; height:100%; object-fit:cover; opacity:0.8;">
                        <source src="https://muratsaglam.co/video/iletisim.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </section>
    </main>

    <app-footer></app-footer>

    <script src="main.js"></script>
</body>
</html>
